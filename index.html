<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- name input play button and label for input -->
    <div id="control">
        <label for="nameInput1">Player1 Name </label>
        <input type="text" id="nameInput1">
        <label for="nameInput2">Enter Your name</label>
        <input type="text" id="nameInput2">
        <button id="playBtn" class="ctrlBtn">Play</button>
        <button id="resetBtn" class="ctrlBtn">Reset</button>
    </div>


    <!-- Display player1 Name& Score and player2 Score -->
    <div id="stats">
        <p id="player1Info"></p>
        <p id="player2Info"></p>
    </div>

    <!-- Actual gameplay -->
    <div id="grid">

    </div>
    
    <script defer src="index.js"></script>
</body>
</html>
